upstream django_app {
    server web:8000;
}

upstream frontend_app {
    server frontend:80;
}

# HTTP redirect to HTTPS
server {
    listen 80;
    server_name riyadacompany.com www.riyadacompany.com 167.86.98.95;
    return 301 https://riyadacompany.com$request_uri;
}

# HTTPS server
server {
    listen 443 ssl;
    server_name riyadacompany.com www.riyadacompany.com;

    ssl_certificate /etc/letsencrypt/live/riyadacompany.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/riyadacompany.com/privkey.pem;

    # SSL optimization
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 100M;

    # Django backend (API)
    location /api/ {
        proxy_pass http://django_app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Django backend (Admin)
    location /admin/ {
        proxy_pass http://django_app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # i18n and accounts
    location /i18n { proxy_pass http://django_app; }
    location /accounts { proxy_pass http://django_app; }

    # Django static files
    location /django_static/ {
        alias /app/staticfiles/;
    }

    # Django media files
    location /media/ {
        alias /app/media/;
    }

    # Frontend (React app)
    location / {
        proxy_pass http://frontend_app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
