upstream django_app {
    server web:8000;
}

upstream frontend_app {
    server frontend:80;
}

server {
    listen 80;
    server_name 167.86.98.95 riyadacompany.com www.riyadacompany.com localhost;

    client_max_body_size 100M;

    # Django backend (API)
    location /api/ {
        proxy_pass http://django_app/api/;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    # Django backend (Admin)
    location /admin/ {
        proxy_pass http://django_app/admin/;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    # i18n and accounts
    location /i18n/ { proxy_pass http://django_app/i18n/; }
    location /accounts/ { proxy_pass http://django_app/accounts/; }

    # Django static files
    location /django_static/ {
        alias /app/staticfiles/;
    }

    # Django media files
    location /media/ {
        alias /app/media/;
    }

    # Frontend (React app)
    location / {
        proxy_pass http://frontend_app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }
}
