version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=${DB_NAME:-ecommerce_db}
      - POSTGRES_USER=${DB_USER:-ecommerce_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-ecommerce_pass}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ecommerce_user} -d ${DB_NAME:-ecommerce_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ./backend/logs:/app/logs
    expose:
      - "8000"
    environment:
      - DEBUG=False
      - DB_NAME=${DB_NAME:-ecommerce_db}
      - DB_USER=${DB_USER:-ecommerce_user}
      - DB_PASSWORD=${DB_PASSWORD:-ecommerce_pass}
      - DB_HOST=db
      - DB_PORT=5432
      - ALLOWED_HOSTS=167.86.98.95,riyadacompany.com,www.riyadacompany.com,localhost,127.0.0.1,web,frontend
      - SECRET_KEY=${SECRET_KEY:-django-insecure-prod-key-change-me}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    expose:
      - "80"
    depends_on:
      - web

  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - web
      - frontend

volumes:
  postgres_data:
  static_volume:
  media_volume:
